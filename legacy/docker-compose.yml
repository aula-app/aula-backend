networks:
  aula_local:

services:
  aula-backend-legacy:
    build:
      context: ./
      args:
        - DOCKER_TAG=local
    environment:
      APACHE_SERVER_NAME: localhost
      APP_ENV: local
      CENTRAL_DB_HOST: ${CENTRAL_DB_HOST:-mariadb}
      CENTRAL_DB_PORT: ${CENTRAL_DB_PORT:-3306}
      CENTRAL_DB_NAME: ${CENTRAL_DB_NAME:-aula_database}
      CENTRAL_DB_USER: ${CENTRAL_DB_USER:-aula_user}
      CENTRAL_DB_PASS: ${CENTRAL_DB_PASS:-example}
    volumes:
      - ./docker-local/_generated_files_data:/var/www/html/files:rw
      - type: bind
        source: ./src
        target: /var/www/html/api
        bind:
          create_host_path: false
      - type: bind
        source: ./config/
        target: /var/www/html/config
        bind:
          create_host_path: false
      - type: bind
        source: ./docker-local/php.ini-development
        target: /etc/php/8.3/apache2/php.ini
        bind:
          create_host_path: true
      - type: bind
        source: ./docker-local/php-xdebug-docker.ini
        target: /etc/php/8.3/apache2/conf.d/21-xdebug-docker.ini
        bind:
          create_host_path: true
      - type: bind
        source: ./docker-local/php-xdebug-docker.ini
        target: /etc/php/8.3/cli/conf.d/21-xdebug-docker.ini
        bind:
          create_host_path: true
    networks:
      - aula_local
    extra_hosts:
      # for resolution on Linux
      - "host.docker.internal:host-gateway"
